debug: false

config-files:
  language: 'en_US'
  # Premium version only.
  per-player-language: true
  force-parse-mini-message: true

debuild-item-method: 'LEGACY'

placeholders:
  result:
    unknown-player: 'Unknown'
    damage-format: "%.0f"
    percentage-format: "%.1f"

math:
  enabled: true