message-settings:
  audience: "participants"
  top-formats:
    "1": "<yellow>1°</yellow><gray> ⏵</gray> {prefix}{player_name} <gray>⏵ </gray><yellow>{damage}</yellow>"
    "2": "<gold>2°</gold><gray> ⏵</gray> {prefix}{player_name} <gray>⏵ </gray><gold>{damage}</gold>"
    "3": "<red>3°</red><gray> ⏵</gray> {prefix}{player_name} <gray>⏵ </gray><red>{damage}</red>"
    "others": "<gray>{position}°</gray><gray> ⏵</gray> {prefix}{player_name} <gray>⏵ </gray><gray>{damage}</gray>"
  broadcast:
    - "&8&m0                                                   0&r"
    - "<#51a66c><b>{mob_display_name} ELIMINADO!</b>"
    - ""
    - "{top_players}"
    - ""
    - "{personal_damage}"
    - "&8&m0                                                   0&r"
  personal-damage: "<gray>Tu daño: </gray><green>{damage} ({percentage}%)</green>"
  personal-no-damage: "<gray>No participaste en la batalla.</gray>"
